<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Chat Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 500px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 600px;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      text-align: center;
    }
    .header h1 { font-size: 24px; margin-bottom: 8px; }
    .header p { opacity: 0.9; font-size: 14px; }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 13px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }
    .status-dot.connected { background: #22c55e; }
    .content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .user-setup {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .user-setup input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
    }
    .user-setup input:focus {
      outline: none;
      border-color: #667eea;
    }
    .user-setup button {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .user-setup button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .user-setup button.disconnect {
      background: #ef4444;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      background: #f9fafb;
    }
    .message {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 85%;
      word-wrap: break-word;
    }
    .message.system {
      background: #e0e7ff;
      color: #4338ca;
      text-align: center;
      max-width: 100%;
      font-size: 13px;
    }
    .message.sent {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-left: auto;
    }
    .message.received {
      background: white;
      border: 1px solid #e5e7eb;
    }
    .message .user {
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 4px;
      opacity: 0.8;
    }
    .message .time {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 4px;
    }
    .message-input {
      display: flex;
      gap: 8px;
    }
    .message-input input {
      flex: 1;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    .message-input input:focus {
      outline: none;
      border-color: #667eea;
    }
    .message-input input:disabled {
      background: #f3f4f6;
      cursor: not-allowed;
    }
    .message-input button {
      padding: 14px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .message-input button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .message-input button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .hint {
      margin-top: 12px;
      padding: 12px;
      background: #f3f4f6;
      border-radius: 8px;
      font-size: 13px;
      color: #6b7280;
    }
    .hint strong { color: #374151; }
    .clients-count {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💬 WebSocket Chat</h1>
      <p>Hono WebSocket Demo</p>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
      </div>
      <div class="clients-count" id="clientsCount"></div>
    </div>
    <div class="content">
      <div class="user-setup">
        <input type="text" id="username" placeholder="Your name" value="User">
        <button id="connectBtn">Connect</button>
      </div>
      <div class="messages" id="messages"></div>
      <div class="message-input">
        <input type="text" id="messageInput" placeholder="Type a message..." disabled>
        <button id="sendBtn" disabled>Send</button>
      </div>
      <div class="hint">
        <strong>Tip:</strong> Open this page in multiple tabs to test real-time chat between clients.
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id)
    const messages = $('messages')
    const messageInput = $('messageInput')
    const sendBtn = $('sendBtn')
    const connectBtn = $('connectBtn')
    const usernameInput = $('username')
    const statusDot = $('statusDot')
    const statusText = $('statusText')
    const clientsCount = $('clientsCount')

    let ws = null
    let username = 'User'

    function formatTime(timestamp) {
      return new Date(timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
    }

    function addMessage(content, type = 'received', user = null, timestamp = null) {
      const div = document.createElement('div')
      div.className = `message ${type}`
      
      let html = ''
      if (user && type !== 'system') {
        html += `<div class="user">${user}</div>`
      }
      html += `<div class="text">${content}</div>`
      if (timestamp) {
        html += `<div class="time">${formatTime(timestamp)}</div>`
      }
      
      div.innerHTML = html
      messages.appendChild(div)
      messages.scrollTop = messages.scrollHeight
    }

    function updateStatus(connected) {
      statusDot.classList.toggle('connected', connected)
      statusText.textContent = connected ? 'Connected' : 'Disconnected'
      connectBtn.textContent = connected ? 'Disconnect' : 'Connect'
      connectBtn.classList.toggle('disconnect', connected)
      messageInput.disabled = !connected
      sendBtn.disabled = !connected
      usernameInput.disabled = connected
    }

    function connect() {
      username = usernameInput.value.trim() || 'User'
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:'
      ws = new WebSocket(`${protocol}//${location.host}/ws`)

      ws.onopen = () => {
        updateStatus(true)
        addMessage('Connected to server', 'system')
      }

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data)
          
          switch (data.type) {
            case 'system':
              addMessage(data.message, 'system')
              if (data.clients !== undefined) {
                clientsCount.textContent = `${data.clients} client(s) online`
              }
              break
            case 'chat':
              const isSelf = data.user === username
              addMessage(data.message, isSelf ? 'sent' : 'received', data.user, data.timestamp)
              break
            case 'pong':
              addMessage('Pong received!', 'system')
              break
            case 'echo':
              addMessage(`Echo: ${JSON.stringify(data.original || data.message)}`, 'system')
              break
            default:
              addMessage(JSON.stringify(data), 'received')
          }
        } catch {
          addMessage(event.data, 'received')
        }
      }

      ws.onclose = () => {
        updateStatus(false)
        addMessage('Disconnected from server', 'system')
        clientsCount.textContent = ''
        ws = null
      }

      ws.onerror = (error) => {
        console.error('WebSocket error:', error)
        addMessage('Connection error', 'system')
      }
    }

    function disconnect() {
      if (ws) {
        ws.close()
      }
    }

    function sendMessage() {
      const message = messageInput.value.trim()
      if (!message || !ws || ws.readyState !== WebSocket.OPEN) return

      ws.send(JSON.stringify({
        type: 'chat',
        user: username,
        message: message
      }))

      messageInput.value = ''
    }

    connectBtn.addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        disconnect()
      } else {
        connect()
      }
    })

    sendBtn.addEventListener('click', sendMessage)

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage()
      }
    })

    // Auto-connect on page load
    // connect()
  </script>
</body>
</html>
